<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login | Bongabon DRRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #020617;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: linear-gradient(145deg, #0f172a, #020617);
            border: 1px solid #1e293b;
            border-radius: 2rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }

        input, button {
            min-height: 56px;
            border-radius: 1rem;
            font-size: 16px;
            width: 100%;
        }

        input {
            background: #0f172a;
            border: 1px solid #1e293b;
            color: white;
            padding: 0 1rem;
        }

        input:focus {
            outline: none;
            border-color: #ef4444;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="index.html" class="inline-flex items-center text-[10px] font-black text-slate-500 hover:text-white mb-6">
            ← Back to Emergency
        </a>

        <h1 class="text-2xl font-black mb-1">PERSONNEL</h1>
        <p class="text-red-500 font-black text-sm mb-8">LOGIN</p>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-400 block mb-2">EMAIL</label>
                <input type="email" id="email" required 
                       placeholder="name@bongabon.gov.ph"
                       autocomplete="username">
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-[10px] font-black text-slate-400">PASSWORD</label>
                    <a href="#" class="text-[9px] text-red-500">Reset</a>
                </div>
                <input type="password" id="passcode" required 
                       placeholder="••••••••"
                       autocomplete="current-password">
            </div>

            <button type="submit" class="bg-red-600 text-white font-black py-4 rounded-xl shadow-lg shadow-red-900/20 mt-6">
                VERIFY & ENTER
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'VERIFYING...';

            const formData = new FormData();
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('passcode').value);

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Redirect based on role
                    if (result.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'respo.html';
                    }
                } else {
                    alert('Invalid credentials');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'VERIFY & ENTER';
                }
            } catch (error) {
                alert('Server connection failed. Make sure XAMPP is running.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'VERIFY & ENTER';
            }
        });
    </script>
</body>
</html>
